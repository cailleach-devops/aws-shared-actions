name: 'ECS Check Repo Config'
description: "Check if needed repository variables are created"
inputs:
  platform:
    required: false
  deployment_key:
    required: false

runs:
  using: "composite"
  steps:
    - name: Fail the action
      if: (inputs.platform == '') || (inputs.deployment_key == '')
      shell: bash
      run: |
        echo "::error title=Missing Configuration:: Ensure that PLATFORM and DEPLOYMENT_KEY variables are set in repository"
        exit 1
